<!DOCTYPE html>
<html>
<head>
<title>Secure Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#f3f4f7;
}

.wrapper{
    width:420px;
    margin:70px auto;
    background:#fff;
    padding:35px;
    border-radius:8px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.title{
    font-size:22px;
    font-weight:600;
    color:#1a2b49;
}

.pink-line{
    width:35px;
    height:4px;
    background:#f372b2;
    margin:15px 0 30px 0;
}

.field-label{
    margin-top:18px;
    font-size:14px;
    color:#5f6c7b;
}

.input-box{
    width:100%;
    padding:14px;
    margin-top:8px;
    border:1px solid #dcdfe6;
    border-radius:6px;
    font-size:15px;
    background:#fafbfc;
}

.input-box:focus{
    outline:none;
    border-color:#528FF0;
    background:white;
}

.pay-btn{
    width:100%;
    margin-top:30px;
    padding:16px;
    font-size:16px;
    border:none;
    border-radius:6px;
    background:linear-gradient(90deg,#f372b2,#ff4f8a);
    color:white;
    cursor:pointer;
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:12px;
    color:#888;
}

.success{
    display:none;
    margin-top:20px;
    text-align:center;
    color:green;
    font-weight:500;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="title">Payment Details</div>
<div class="pink-line"></div>

<div class="field-label">Amount</div>
<input type="number" class="input-box" id="amount"
placeholder="Enter amount"
oninput="updateButton()">

<div class="field-label">UPI ID</div>
<input type="text" class="input-box" id="upi"
placeholder="yourname@upi">

<button class="pay-btn" id="payBtn" onclick="payNow()">
Pay ₹ 0.00
</button>

<div class="success" id="successMsg"></div>

<div class="footer">
Secured by Demo Payment Gateway
</div>

</div>

<script>

// get return URL from query parameter
const params = new URLSearchParams(window.location.search);
const returnURL = params.get("returnURL");

function updateButton(){
var amt = document.getElementById("amount").value;

if(amt){
document.getElementById("payBtn").innerHTML =
"Pay ₹ " + parseFloat(amt).toFixed(2);
}else{
document.getElementById("payBtn").innerHTML =
"Pay ₹ 0.00";
}
}

function payNow(){

var amt = document.getElementById("amount").value;
var upi = document.getElementById("upi").value;

if(amt=="" || amt<=0){
alert("Enter valid amount");
return;
}

if(upi==""){
alert("Enter UPI ID");
return;
}

var txnID = "TXN" + Math.floor(Math.random()*1000000);

document.getElementById("successMsg").style.display="block";

document.getElementById("successMsg").innerHTML =
"✔ Payment Successful <br>Transaction ID: "+txnID+
"<br>Redirecting to Application...";

// redirect to pega
setTimeout(function(){

if(returnURL){
window.location.href = returnURL;
}

},3000);

}

</script>

</body>
</html>
